name: Deploy Floorball Microservice

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to Coolify
    runs-on: self-hosted
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "http://46.4.162.232:8000/api/v1/deploy?uuid=oqnfbjch3qbaq9nhx02s7lce&force=true" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d)"
